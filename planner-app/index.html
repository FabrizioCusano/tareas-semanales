<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tareas de la semana</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
  transition: 0.3s;
  overflow-x: hidden;
}

.dark {
  background: #1e1e1e;
  color: white;
}

h1 { text-align: center; }

.container { max-width: 500px; margin: auto; }

.dia {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

.dark .dia { background: #2a2a2a; }

.input-area { display: flex; gap: 10px; margin-bottom: 10px; }

input, select {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

li {
  list-style: none;
  padding: 8px;
  margin-bottom: 5px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}

.alta { border-left: 5px solid red; }
.media { border-left: 5px solid orange; }
.baja { border-left: 5px solid green; }

.star {
  position: fixed;
  font-size: 24px;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.5); }
}
</style>
</head>

<body>
<h1 id="titulo">Tareas de la semana 📅</h1>
<button onclick="toggleDark()">🌙 Modo oscuro</button>
<div class="container" id="container"></div>

<script>
const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

let datos = JSON.parse(localStorage.getItem("planner")) || {};
let dark = localStorage.getItem("dark") === "true";
let streak = parseInt(localStorage.getItem("streak")) || 0;
let ultimaFecha = localStorage.getItem("ultimaFecha") || "";

if(dark) document.body.classList.add("dark");

dias.forEach(d => { if(!datos[d]) datos[d]=[]; });

function guardar(){
  localStorage.setItem("planner", JSON.stringify(datos));
  localStorage.setItem("dark", document.body.classList.contains("dark"));
  localStorage.setItem("streak", streak);
  localStorage.setItem("ultimaFecha", ultimaFecha);
}

function toggleDark(){
  document.body.classList.toggle("dark");
  guardar();
}

function sonidoOK(){
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang.ogg");
  audio.volume = 1.0;
  audio.play().catch(()=>{});
}

function vibrar(){
  if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
  }
}

function lluviaEstrellas(){
  for(let i=0;i<40;i++){
    let star = document.createElement("div");
    star.innerHTML = "⭐";
    star.className = "star";

    let x = (Math.random()-0.5)*800;
    let y = (Math.random()-0.5)*800;

    star.style.left = "50%";
    star.style.top = "50%";
    star.style.setProperty('--x', x + 'px');
    star.style.setProperty('--y', y + 'px');

    document.body.appendChild(star);
    setTimeout(()=>star.remove(),1000);
  }
}

// 🔔 NOTIFICACIONES
function pedirPermisoNotificaciones(){
  if("Notification" in window){
    if(Notification.permission !== "granted"){
      Notification.requestPermission();
    }
  }
}

function enviarNotificacion(msg){
  if("Notification" in window && Notification.permission === "granted"){
    new Notification("📌 Recordatorio", {
      body: msg,
      icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
    });
  }
}

function hayPendientes(){
  let todas = [];
  dias.forEach(d=> todas = todas.concat(datos[d]));
  return todas.some(t=>t.estado===0);
}

// cada 1 minuto revisa
setInterval(()=>{
  if(hayPendientes()){
    enviarNotificacion("Tenés tareas pendientes 👀");
  }
},60000);

function agregar(dia){
  let input = document.getElementById("input-"+dia);
  let prio = document.getElementById("prio-"+dia);

  if(!input.value) return;

  datos[dia].push({texto:input.value, estado:0, prio: prio.value});
  input.value="";

  guardar();
  render();
}

function cambiarEstado(dia,i){
  let t = datos[dia][i];
  t.estado = (t.estado+1)%2;

  if(t.estado===1){
    sonidoOK();
    lluviaEstrellas();
    vibrar();
  }

  guardar();
  render();
}

function eliminar(dia,i){
  datos[dia].splice(i,1);
  guardar();
  render();
}

function calcularProgresoTotal(){
  let todas = [];
  dias.forEach(d=> todas = todas.concat(datos[d]));
  if(todas.length===0) return 0;
  let hechas = todas.filter(t=>t.estado===1).length;
  return Math.round((hechas/todas.length)*100);
}

function actualizarRacha(){
  let hoy = new Date().toDateString();
  let progreso = calcularProgresoTotal();

  if(progreso===100 && ultimaFecha!==hoy){
    streak++;
    ultimaFecha = hoy;
  }

  guardar();
}

function render(){
  let c = document.getElementById("container");
  c.innerHTML="";

  dias.forEach(dia=>{
    let div = document.createElement("div");
    div.className="dia";

    let html = `<h2>${dia}</h2>
    <div class="input-area">
      <input id="input-${dia}" placeholder="Tarea">
      <select id="prio-${dia}">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <button onclick="agregar('${dia}')">+</button>
    </div><ul>`;

    datos[dia].forEach((t,i)=>{
      let done = t.estado?"✔️":"⬜";

      html += `<li class="${t.prio}">
        <span onclick="cambiarEstado('${dia}',${i})">${done} ${t.texto}</span>
        <button onclick="eliminar('${dia}',${i})">❌</button>
      </li>`;
    });

    html += "</ul>";
    div.innerHTML = html;
    c.appendChild(div);
  });

  actualizarRacha();
  document.getElementById("titulo").innerText = `Tareas de la semana 📅 | 🔥 Racha: ${streak}`;
}

// pedir permiso al entrar
pedirPermisoNotificaciones();

render();
</script>
</body>
</html>
